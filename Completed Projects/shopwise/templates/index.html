<!DOCTYPE html>
<html>
<head>
  <title>Product Catalog Vectorization</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>#loadingSpinner{display:none}</style>
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="card shadow-sm">
    <div class="card-body">
      <h2 class="card-title mb-4">Upload Product Catalog (CSV)</h2>

      <div id="alertArea"></div>

      <form id="vecForm" enctype="multipart/form-data">
        <div class="mb-3">
          <input id="fileInput" class="form-control" type="file" name="file" accept=".csv" required>
        </div>
        <button id="uploadBtn" type="submit" class="btn btn-primary">
          Upload & Vectorize
        </button>

        <div id="loadingSpinner" class="mt-3 text-center">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Uploading...</span>
          </div>
          <p class="text-muted mt-2">Processing, please wait...</p>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
const form   = document.getElementById('vecForm');
const btn    = document.getElementById('uploadBtn');
const spin   = document.getElementById('loadingSpinner');
const alertA = document.getElementById('alertArea');
const fileEl = document.getElementById('fileInput');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  alertA.innerHTML = '';
  if (!fileEl.files.length) {
    alertA.innerHTML = `<div class="alert alert-warning">Please choose a CSV file.</div>`;
    return;
  }

  btn.disabled = true;
  spin.style.display = 'block';

  const data = new FormData(form);
  try {
    const res = await fetch('/vectorize', { method: 'POST', body: data });
    if (!res.ok) {
      const txt = await res.text().catch(() => '');
      throw new Error(txt || `Server error (${res.status})`);
    }
    const json = await res.json().catch(() => ({ ok: true, message: 'Vectorization complete!' }));
    alertA.innerHTML = `<div class="alert alert-success alert-dismissible fade show" role="alert">
        ✅ ${json.message || 'Vectorization complete! Your products are ready for search.'}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>`;
    // Optional: reset the form
    form.reset();
  } catch (err) {
    alertA.innerHTML = `<div class="alert alert-danger alert-dismissible fade show" role="alert">
        ❌ ${err.message || 'Something went wrong while vectorizing.'}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>`;
  } finally {
    btn.disabled = false;
    spin.style.display = 'none';
  }
});
</script>
</body>
</html>
